name: Shark2MQTT
version: "1.0.0"
slug: shark2mqtt
description: Bridge SharkNinja robot vacuums to Home Assistant via MQTT autodiscovery.
url: https://github.com/CamSoper/shark2mqtt
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
map:
  - data:rw
options:
  shark_username: ""
  shark_password: ""
  mqtt_host: ""
  shark_region: "us"
  shark_household_id: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_prefix: "shark2mqtt"
  poll_interval: 300
  poll_interval_active: 20
  log_level: "INFO"
schema:
  shark_username: str
  shark_password: str
  mqtt_host: str
  shark_region: list(us|eu)
  shark_household_id: str?
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: str?
  mqtt_prefix: str
  poll_interval: int(10,3600)
  poll_interval_active: int(5,300)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
image: ghcr.io/camsoper/shark2mqtt
