name: Shark2MQTT
version: "1.0.1"
slug: shark2mqtt
description: Bridge SharkNinja robot vacuums to Home Assistant via MQTT autodiscovery.
url: https://github.com/400HPMustang/shark2mqtt-addon
arch:
  - amd64
  - aarch64
startup: application
boot: auto
apparmor: true
backup: hot
options:
  shark_username: null
  shark_password: null
  mqtt_host: core-mosquitto
  shark_region: us
  shark_household_id: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_prefix: shark2mqtt
  poll_interval: 300
  poll_interval_active: 20
  log_level: INFO
schema:
  shark_username: email
  shark_password: password
  mqtt_host: str
  shark_region: list(us|eu)
  shark_household_id: str?
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_prefix: str
  poll_interval: int(10,3600)
  poll_interval_active: int(5,300)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
